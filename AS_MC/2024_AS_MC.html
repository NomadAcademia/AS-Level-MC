<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economics AS & A Level Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0; /* Remove default margin */
            padding: 20px; /* Add padding to body instead of quiz-container directly for full background */
            background-color: #f4f4f4;
            color: #333;
            display: flex; /* For centering the quiz container */
            justify-content: center; /* For centering the quiz container */
            align-items: flex-start; /* Align to top */
            min-height: 100vh; /* Ensure background covers full height */
        }
        .quiz-title-container { /* New container for the title */
            width: 100%;
            max-width: 800px; /* Match quiz-container width */
            margin-bottom: 20px; /* Space between title and quiz */
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: left; /* Align title to the left */
        }
        .quiz-title-container h1 {
            margin: 0; /* Remove default h1 margin */
            font-size: 1.5em; /* Adjust title size as needed */
        }
        .quiz-container {
            width: 100%; /* Make it responsive */
            max-width: 800px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .question-block {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .question-block:last-child {
            border-bottom: none;
        }
        .question-source {
            font-size: 0.8em;
            color: #777;
            margin-bottom: 10px;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .options label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .options label:hover {
            background-color: #f0f0f0;
        }
        .options input[type="radio"] {
            margin-right: 10px;
            vertical-align: middle;
        }
        .action-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .action-button:hover {
            background-color: #0056b3;
        }
        .answer-explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #e9f7ef;
            border-left: 5px solid #4CAF50; /* Thicker border */
            border-radius: 4px; /* Rounded corners */
            display: none; /* Hidden by default */
        }
        .answer-explanation .correct-answer {
            font-weight: bold;
            color: #4CAF50;
            font-size: 1.1em; /* Slightly larger */
            margin-bottom: 5px;
            display: block;
        }
        .answer-explanation p {
            margin-top: 0;
            margin-bottom: 8px; /* Space between paragraphs in explanation */
        }
         .answer-explanation p:last-child {
            margin-bottom: 0;
        }
        table {
            width: auto;
            border-collapse: collapse;
            margin-bottom: 10px;
            margin-right: auto;
            margin-left: 0;
            font-size: 0.9em; /* Slightly smaller table font */
        }
        th, td {
            border: 1px solid #ddd;
            padding: 6px 8px; /* Adjust padding */
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold; /* Make table headers bold */
        }
        /* Flex container for the whole page content */
        .page-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; /* Center children (title container and quiz container) */
            width: 100%;
        }
    </style>
</head>
<body>

<div class="page-content-wrapper">
    <div class="quiz-title-container">
        <h1>Cambridge International AS & A Level Economics Quiz</h1>
    </div>
    <div class="quiz-container">
        <div id="quiz"></div>
    </div>
</div>

<script>
    const allQuestions = [
        // From 9708/12 February/March 2024
        {
            source: "Source: 9708/12 February/March 2024, Q1",
            questionText: "Why does a production possibility curve exist for every economy?",
            tableHTML: null,
            options: [
                "Resources are unlimited.",
                "Resources have alternative uses.",
                "Some resources can be imported.",
                "Some resources may be unemployed."
            ],
            correctAnswer: "B",
            explanation: "A Production Possibility Curve (PPC) illustrates the trade-offs an economy faces due to scarce resources. Because resources are limited and can be used in different ways (alternative uses), choosing to produce more of one good necessitates producing less of another, defining the curve."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q2",
            questionText: "Which statement is a normative statement?",
            tableHTML: null,
            options: [
                "Aggregate demand will increase following a decrease in interest rates.",
                "A rise in unemployment will decrease inflationary pressures.",
                "The incentive to work will rise if benefit payments are reduced.",
                "Unsustainable economic growth is more harmful to the economy than hyperinflation."
            ],
            correctAnswer: "D",
            explanation: "Normative statements express opinions or value judgments about what 'should be' and are not testable. Option D makes a subjective comparison ('more harmful') which is a value judgment. Options A, B, and C are positive statements that can be tested against facts or economic theory."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q3",
            questionText: "Which combination best describes the basic economic problem?",
            tableHTML: `
                <table>
                  <thead><tr><th></th><th>resources</th><th>wants</th></tr></thead>
                  <tbody>
                    <tr><td>A</td><td>limited</td><td>limited</td></tr>
                    <tr><td>B</td><td>limited</td><td>unlimited</td></tr>
                    <tr><td>C</td><td>unlimited</td><td>limited</td></tr>
                    <tr><td>D</td><td>unlimited</td><td>unlimited</td></tr>
                  </tbody>
                </table>`,
            options: ["A", "B", "C", "D"], // These will be labels for radio buttons, not the table content itself
            correctAnswer: "B",
            explanation: "The basic economic problem, scarcity, arises because economic resources are finite (limited), while human wants and needs are infinite (unlimited). This necessitates choices about resource allocation."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q4",
            questionText: "What is the main reason an economy is unlikely to rely completely on market forces to allocate resources?",
            tableHTML: null,
            options: [
                "Demerit goods will be over supplied.",
                "Merit goods will be under supplied.",
                "Private goods will not be supplied.",
                "Public goods will not be supplied."
            ],
            correctAnswer: "D",
            explanation: "Public goods (e.g., national defense, street lighting) are non-excludable and non-rivalrous. This leads to the free-rider problem, meaning private firms have no incentive to supply them because they cannot charge users. Thus, market forces alone would lead to their under-provision or non-provision."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q5",
            questionText: "What is the opportunity cost to a person of spending $20 on a new pair of sports shoes?",
            tableHTML: null,
            options: [
                "all the other things the person could have bought",
                "the cost of getting to the sports shop",
                "the current value of the person’s old pair of shoes",
                "the next best thing that could have been bought with the $20"
            ],
            correctAnswer: "D",
            explanation: "Opportunity cost is defined as the value of the next best alternative forgone when a choice is made. So, if $20 is spent on shoes, the opportunity cost is the next best item or service that could have been purchased with that $20."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q6",
            questionText: "What is the definition of effective demand?",
            tableHTML: null,
            options: [
                "demand that is speculative",
                "demand that is supported by the ability to pay",
                "the relationship between price and quantity demanded",
                "the total amount demanded by consumers"
            ],
            correctAnswer: "B",
            explanation: "Effective demand refers to the desire for a good or service backed by the ability and willingness to pay for it at a given price. It's not just a want, but a want that can be translated into a purchase."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q7",
            questionText: "The price elasticity of demand for good X is –2.4, its income elasticity of demand is –0.4 and the cross elasticity of demand for good X with respect to good Y is +0.8. What is the correct description of good X?",
            tableHTML: null,
            options: [
                "inferior good, price-elastic demand and substitute for good Y",
                "inferior good, price-inelastic demand and complement to good Y",
                "normal good, price-elastic demand and complement to good Y",
                "normal good, price-inelastic demand and substitute for good Y"
            ],
            correctAnswer: "A",
            explanation: "An income elasticity of –0.4 indicates an inferior good (demand decreases as income rises). A price elasticity of –2.4 (absolute value |–2.4| > 1) means demand is price-elastic. A positive cross elasticity of demand (+0.8) with good Y indicates that good X is a substitute for good Y."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q9",
            questionText: "The price elasticity of the supply of yoghurt is estimated to be +1.5. If the demand for yoghurt rises and price rises by 20%, how much more will be supplied to the market?",
            tableHTML: null,
            options: ["0.3%", "3.0%", "13.3%", "30%"],
            correctAnswer: "D",
            explanation: "Price elasticity of supply (PES) = (% change in quantity supplied) / (% change in price). Therefore, % change in quantity supplied = PES × % change in price = 1.5 × 20% = 30%."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q10",
            questionText: "Butter is a normal good. It is in joint demand with bread and in joint supply with buttermilk. The demand for butter increases because of a rise in consumer incomes. What are the effects of this increase on the prices of bread and buttermilk?",
            tableHTML: `
                <table>
                  <thead><tr><th></th><th>price of bread</th><th>price of buttermilk</th></tr></thead>
                  <tbody>
                    <tr><td>A</td><td>decreases</td><td>decreases</td></tr>
                    <tr><td>B</td><td>decreases</td><td>increases</td></tr>
                    <tr><td>C</td><td>increases</td><td>decreases</td></tr>
                    <tr><td>D</td><td>increases</td><td>increases</td></tr>
                  </tbody>
                </table>`,
            options: ["A", "B", "C", "D"],
            correctAnswer: "C",
            explanation: "A rise in consumer incomes increases demand for butter (normal good), increasing its price. Butter and bread are in joint demand (complements), so increased demand for butter increases demand for bread, raising the price of bread. Butter and buttermilk are in joint supply; producing more butter means more buttermilk is also produced (supply of buttermilk increases), which tends to decrease the price of buttermilk."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q12",
            questionText: "A policy that aims to reduce the degree of inequality of income will also reduce the level of employment in a country. What is most likely to be such a policy?",
            tableHTML: null,
            options: [
                "The effective minimum wage is increased by 25%.",
                "The rate of income tax paid by the lowest band of earners is reduced.",
                "The government increases the level of subsidies given to producers of some merit goods.",
                "The government provides more goods that are regarded as essential."
            ],
            correctAnswer: "A",
            explanation: "Increasing the minimum wage aims to reduce income inequality by boosting wages for low-paid workers. However, if the minimum wage is set above the market equilibrium, it can lead to a decrease in the quantity of labor demanded by firms, thus reducing employment (creating unemployment)."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q13",
            questionText: "What explains the underconsumption of merit goods?",
            tableHTML: null,
            options: [
                "Their value is not fully understood by consumers.",
                "They are unproductive goods and services.",
                "They can only be provided by the government.",
                "They are only provided by private sector businesses."
            ],
            correctAnswer: "A",
            explanation: "Merit goods are goods that are considered beneficial for individuals and society, but consumers may under-consume them if left to market forces, often due to imperfect information – they don't fully understand or appreciate the long-term benefits (e.g., education, healthcare)."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q14",
            questionText: "A country uses an income tax under which the first $10 000 of income is tax-free, the next $20 000 is taxed at 20% and any income over $30 000 is taxed at a top rate of 40%. It also levies a sales tax of 10% on most products. Which combination of tax changes is most likely to create a more equal distribution of income in the country?",
            tableHTML: `
                <table>
                  <thead><tr><th></th><th>income tax</th><th>sales tax</th></tr></thead>
                  <tbody>
                    <tr><td>A</td><td>a higher tax-free allowance</td><td>a higher rate of tax</td></tr>
                    <tr><td>B</td><td>a higher top rate of tax</td><td>a lower rate of tax</td></tr>
                    <tr><td>C</td><td>a lower tax-free allowance</td><td>a higher number of exempt goods</td></tr>
                    <tr><td>D</td><td>a lower top rate of tax</td><td>a lower number of exempt goods</td></tr>
                  </tbody>
                </table>`,
            options: ["A", "B", "C", "D"],
            correctAnswer: "B",
            explanation: "A higher top rate of income tax makes the income tax system more progressive, taking a larger proportion from higher earners. A lower rate of sales tax (or more exemptions for essential goods) makes the sales tax less regressive, as sales taxes tend to take a larger percentage of income from lower earners. Both changes together would likely lead to a more equal distribution of income."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q15",
            questionText: "The table shows real GDP expressed as an index number in each quarter of 2021. <br>What can be concluded from the table?",
            tableHTML:`
                <table>
                  <thead><tr><th>2021</th><th>index of GDP in real terms (2020 = 100)</th></tr></thead>
                  <tbody>
                    <tr><td>Q1</td><td>99.4</td></tr>
                    <tr><td>Q2</td><td>99.3</td></tr>
                    <tr><td>Q3</td><td>100.1</td></tr>
                    <tr><td>Q4</td><td>100.4</td></tr>
                  </tbody>
                </table>`,
            options: [
                "Inflation reduced the real value of GDP in the first six months of 2021.",
                "Real GDP was lower at the end of 2021 than 2020.",
                "The economy was in recession at the end of the first six months of 2021.",
                "The standard of living was higher at the end of 2021 than in 2020."
            ],
            correctAnswer: "C",
            explanation: "A recession is defined as two consecutive quarters of falling real GDP. Comparing Q4 2020 (index 100) to Q1 2021 (index 99.4), real GDP fell. Comparing Q1 2021 (index 99.4) to Q2 2021 (index 99.3), real GDP fell again. Thus, there were two consecutive quarters of negative real GDP growth by the end of the first six months of 2021, indicating a recession."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q16",
            questionText: "What is least likely to cause a simultaneous increase in demand-pull and cost-push inflation?",
            tableHTML: null,
            options: [
                "depreciation of currency",
                "increased import tariffs",
                "decreased spending on infrastructure",
                "increased wages"
            ],
            correctAnswer: "C",
            explanation: "Decreased spending on infrastructure would likely reduce aggregate demand (less demand-pull inflation) and could, in the long run, hinder productivity, potentially contributing to cost-push inflation if it constrains supply. However, this is less direct for simultaneous effects. A (depreciation makes imports more expensive - cost-push, and exports cheaper - demand-pull), B (tariffs increase import costs - cost-push), and D (increased wages are a cost for firms - cost-push, and increase income for consumers - demand-pull) are more direct causes of both types of inflation simultaneously."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q17",
            questionText: "According to the circular flow of income, what would be the immediate result of an increase in the value of a country’s exports?",
            tableHTML: null,
            options: [
                "imports would increase",
                "national income would increase",
                "savings would increase",
                "taxes would increase"
            ],
            correctAnswer: "B",
            explanation: "Exports (X) are an injection into the circular flow of income. An increase in exports means more income is flowing into the country's economy from abroad, directly increasing national income (Y = C + I + G + X - M)."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q18",
            questionText: "To calculate the unemployment rate, the number unemployed is related to",
            tableHTML: null,
            options: [
                "the total adult population aged 18–65.",
                "the number of unemployed who are seeking work.",
                "the total number in full-time employment.",
                "the total population in the labour force."
            ],
            correctAnswer: "D",
            explanation: "The unemployment rate is calculated as (Number of Unemployed / Labour Force) × 100. The labour force consists of those who are employed plus those who are unemployed and actively seeking work."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q19",
            questionText: "Aggregate demand in an economy may decrease as a result of an increase in",
            tableHTML: null,
            options: [
                "consumption expenditure.",
                "government expenditure.",
                "import expenditure.",
                "investment expenditure."
            ],
            correctAnswer: "C",
            explanation: "Aggregate Demand (AD) = C + I + G + (X - M). An increase in import expenditure (M) means more money is flowing out of the economy to buy foreign goods. Since M is subtracted in the AD equation, an increase in M will lead to a decrease in AD, all else being equal."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q20",
            questionText: "A government has a balanced budget. It decides to increase its spending by 10%. Which increase in government revenue would produce a budget surplus?",
            tableHTML: null,
            options: ["–10%", "0%", "+10%", "+20%"],
            correctAnswer: "D",
            explanation: "Let initial spending (G) = initial revenue (T). New spending G' = G * 1.10. For a budget surplus, new revenue T' > G'. If T increases by 10%, T' = T * 1.10 = G * 1.10 = G'. This is a balanced budget. If T increases by 20%, T' = T * 1.20 = G * 1.20. Since G * 1.20 > G * 1.10, this would result in a surplus (T' > G')."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q21",
            questionText: "An economy has an unemployment rate of 8%, an increase of 2% from the previous year. At the same time, the current account deficit rose from 3% of GDP to 4% of GDP. What would be most likely to reduce both unemployment and the current account deficit?",
            tableHTML: null,
            options: [
                "decrease government spending",
                "depreciation of the currency",
                "increase indirect taxation",
                "increase interest rates"
            ],
            correctAnswer: "B",
            explanation: "A depreciation of the currency makes exports cheaper and imports more expensive. Cheaper exports can lead to increased export demand (reducing the current account deficit and boosting AD, which can reduce unemployment). More expensive imports can lead to a switch to domestic goods (reducing the current account deficit and boosting AD, reducing unemployment)."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q23",
            questionText: "What can be considered an expansionary supply-side policy?",
            tableHTML: null,
            options: [
                "an increase in government expenditure on training",
                "an increase in sales tax",
                "an increase in the rate of interest",
                "an increase of the exchange rate"
            ],
            correctAnswer: "A",
            explanation: "Expansionary supply-side policies aim to increase the long-run aggregate supply (LRAS) or productive capacity of the economy. Increased government expenditure on training improves the skills and productivity of the workforce, thus shifting LRAS to the right."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q24",
            questionText: "The table indicates the factor inputs required to produce wheat and cars in countries X and Y.<br>What makes it possible for both countries to benefit from trade?",
            tableHTML:`
                <table>
                  <thead><tr><th></th><th>units of factor inputs to produce one tonne of wheat</th><th>units of factor inputs to produce one car</th></tr></thead>
                  <tbody>
                    <tr><td>country X</td><td>4</td><td>2</td></tr>
                    <tr><td>country Y</td><td>8</td><td>6</td></tr>
                  </tbody>
                </table>`,
            options: [
                "Country X has an absolute advantage in wheat and car production.",
                "Country Y has an absolute advantage in wheat and car production.",
                "Country Y has a comparative advantage in wheat production.",
                "Opportunity cost of wheat and car production is the same between countries."
            ],
            correctAnswer: "C",
            explanation: "Country X needs 4 units for wheat, 2 for a car. Opportunity cost of 1 wheat = 4/2 = 2 cars. Opportunity cost of 1 car = 2/4 = 0.5 wheat. Country Y needs 8 units for wheat, 6 for a car. Opportunity cost of 1 wheat = 8/6 = 1.33 cars. Opportunity cost of 1 car = 6/8 = 0.75 wheat. Country Y has a lower opportunity cost in producing wheat (1.33 cars vs 2 cars for X). Thus, Country Y has a comparative advantage in wheat. Country X has a comparative advantage in cars (0.5 wheat vs 0.75 wheat for Y). Trade is beneficial when countries specialize based on comparative advantage."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q25",
            questionText: "A government decides to allow the country’s currency to depreciate to remove the deficit on its current account of the balance of payments. What is the most likely reason why this would not work?",
            tableHTML: null,
            options: [
                "The country gains a competitive advantage from the depreciation.",
                "The country has a surplus on its capital and financial accounts.",
                "The price elasticities of demand for the country’s exports and imports are greater than one.",
                "There are high trade barriers with the country’s main trading partners."
            ],
            correctAnswer: "D",
            explanation: "For depreciation to improve the current account, the Marshall-Lerner condition must hold (sum of PED for exports and PED for imports > 1). However, even if this holds, high trade barriers (e.g., tariffs, quotas) imposed by trading partners on the country's exports can prevent export volumes from increasing significantly, thus limiting the effectiveness of depreciation."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q26",
            questionText: "When must the terms of trade of a country change?",
            tableHTML: null,
            options: [
                "when the volume of exports falls and the volume of imports rises",
                "when the total value of exports falls and the total value of imports rises",
                "when the balance of trade in goods moves from deficit to surplus",
                "when the average price of exports rises and the average price of imports falls"
            ],
            correctAnswer: "D",
            explanation: "Terms of Trade (ToT) = (Index of export prices / Index of import prices) × 100. If the average price of exports rises and the average price of imports falls, the numerator increases and the denominator decreases, leading to a definite increase (improvement) in the ToT. Changes in volumes or values alone do not guarantee a change in the ToT ratio."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q27",
            questionText: "The table shows an extract from a country’s balance of payments.<br>What is the current account balance?",
            tableHTML:`
                <table>
                  <thead><tr><th></th><th>exports $ billion</th><th>imports $ billion</th></tr></thead>
                  <tbody>
                    <tr><td>trade in goods</td><td>150</td><td>200</td></tr>
                    <tr><td>trade in services</td><td>70</td><td>50</td></tr>
                    <tr><td>primary (investment) income</td><td>120</td><td>100</td></tr>
                    <tr><td>secondary (transfer) income</td><td>15</td><td>20</td></tr>
                  </tbody>
                </table>`,
            options: ["–$10bn", "–$15bn", "–$30bn", "–$50bn"],
            correctAnswer: "B",
            explanation: "Current Account Balance = (Exports of Goods - Imports of Goods) + (Exports of Services - Imports of Services) + Net Primary Income + Net Secondary Income.Goods: 150 - 200 = -50. Services: 70 - 50 = +20. Primary Income: 120 - 100 = +20. Secondary Income: 15 - 20 = -5. Total = -50 + 20 + 20 - 5 = -15bn."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q28",
            questionText: "The table shows the goods balance and services balance for a country in selected years.<br>Between which years did the overall goods and services balance change the most?",
            tableHTML:`
                <table>
                  <thead><tr><th>year</th><th>goods balance $ billion</th><th>services balance $ billion</th></tr></thead>
                  <tbody>
                    <tr><td>2015</td><td>+120</td><td>–30</td></tr>
                    <tr><td>2016</td><td>+110</td><td>–30</td></tr>
                    <tr><td>2017</td><td>+50</td><td>–10</td></tr>
                    <tr><td>2018</td><td>+130</td><td>–60</td></tr>
                    <tr><td>2019</td><td>+140</td><td>–50</td></tr>
                  </tbody>
                </table>`,
            options: ["2015–2016", "2016–2017", "2017–2018", "2018–2019"],
            correctAnswer: "B",
            explanation: "Calculate overall balance for each year:\n2015: 120-30 = +90.\n2016: 110-30 = +80. Change 2015-16: |80-90| = 10.\n2017: 50-10 = +40. Change 2016-17: |40-80| = 40.\n2018: 130-60 = +70. Change 2017-18: |70-40| = 30.\n2019: 140-50 = +90. Change 2018-19: |90-70| = 20.\nThe largest change is 40, between 2016 and 2017."
        },
        {
            source: "Source: 9708/12 February/March 2024, Q30",
            questionText: "What is not a likely cause of a deficit in the current account of the balance of payments?",
            tableHTML: null,
            options: [
                "Consumer spending is low.",
                "Primary incomes in the form of investment income are low.",
                "The rate of exchange is high.",
                "Wage costs of production are high."
            ],
            correctAnswer: "A",

    function renderQuiz() {
        const quizContainer = document.getElementById('quiz');
        if (!quizContainer) {
            console.error("Quiz container not found!");
            return;
        }

        allQuestions.forEach((q, index) => {
            const questionId = `q${index}`;
            const questionBlock = document.createElement('div');
            questionBlock.classList.add('question-block');

            const sourceP = document.createElement('p');
            sourceP.classList.add('question-source');
            sourceP.textContent = q.source;
            questionBlock.appendChild(sourceP);

            const questionTextP = document.createElement('p');
            questionTextP.classList.add('question-text');
            
            let questionContent = `${index + 1}. ${q.questionText.replace(/\n(<br>)?Table for options:/g, "")}`; // Remove "Table for options" if present after line break
            questionTextP.innerHTML = questionContent.replace(/\n/g, "<br>"); // Handle explicit newlines
            
            // Append tableHTML if it's part of the question stem, not an options table
            if (q.tableHTML && !(q.options.length === 4 && q.options[0].length === 1 && q.options.every(opt => /^[A-D]$/.test(opt)))) {
                const stemTableDiv = document.createElement('div');
                stemTableDiv.innerHTML = q.tableHTML;
                questionTextP.appendChild(stemTableDiv); // Append to question text paragraph
            }
            questionBlock.appendChild(questionTextP);


            // If the tableHTML is for options (typical structure), render it here.
            if (q.tableHTML && q.options.length === 4 && q.options[0].length === 1 && q.options.every(opt => /^[A-D]$/.test(opt))) {
                const tableDiv = document.createElement('div');
                tableDiv.innerHTML = q.tableHTML;
                questionBlock.appendChild(tableDiv);
            }


            const optionsDiv = document.createElement('div');
            optionsDiv.classList.add('options');
            q.options.forEach((optionText, i) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = questionId;
                radio.value = String.fromCharCode(65 + i); // A, B, C, D
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(" " + optionText));
                optionsDiv.appendChild(label);
            });
            questionBlock.appendChild(optionsDiv);

            const button = document.createElement('button');
            button.classList.add('action-button');
            button.textContent = 'Show Answer & Explanation';
            questionBlock.appendChild(button);

            const answerDiv = document.createElement('div');
            answerDiv.classList.add('answer-explanation');
            answerDiv.innerHTML = `
                <span class="correct-answer">Correct Answer: ${q.correctAnswer}</span>
                <p><b>Explanation:</b> ${q.explanation}</p>
            `;
            questionBlock.appendChild(answerDiv);

            button.addEventListener('click', () => {
                answerDiv.style.display = answerDiv.style.display === 'none' ? 'block' : 'none';
            });

            quizContainer.appendChild(questionBlock);
        });
    }

    // Ensure the DOM is fully loaded before trying to render the quiz
    document.addEventListener('DOMContentLoaded', renderQuiz);
</script>
