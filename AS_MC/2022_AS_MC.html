            allQuestionsData2022.push({ id: 'p10q16', source: '9708/12 May/June 2022, Q16', questionText: "To improve the air quality for its citizens, a government introduces a subsidy for the producers of cars powered by batteries charged from the electricity supply. What are the likely effects of this subsidy on the price and sales of electricity?", tableHTML: `<table><thead><tr><th></th><th>price of electricity</th><th>sales of electricity</th></tr></thead><tbody><tr><td>A</td><td>falls</td><td>falls</td></tr><tr><td>B</td><td>falls</td><td>rises</td></tr><tr><td>C</td><td>rises</td><td>falls</td></tr><tr><td>D</td><td>rises</td><td>rises</td></tr></tbody></table>`, optionsType: 'choice_from_table', options: [ { value: "A", text: "A" }, { value: "B", text: "B" }, { value: "C", text: "C" }, { value: "D", text: "D" } ]});

            allQuestionsData2022.push({ id: 'p10q24', source: '9708/12 May/June 2022, Q24', questionText: "The table gives different combinations of possible values for a country’s price elasticity of demand for exports and price elasticity of demand for its imports. Following the devaluation of the country’s currency, under which combination of elasticities would the country’s balance of payments on the current account worsen?", tableHTML: `<table><thead><tr><th></th><th>price elasticity of demand for exports</th><th>price elasticity of demand for imports</th></tr></thead><tbody><tr><td>A</td><td>0.3</td><td>0.3</td></tr><tr><td>B</td><td>0.2</td><td>0.9</td></tr><tr><td>C</td><td>0.6</td><td>0.5</td></tr><tr><td>D</td><td>1.2</td><td>1.2</td></tr></tbody></table>`, optionsType: 'choice_from_table', options: [ { value: "A", text: "A" }, { value: "B", text: "B" }, { value: "C", text: "C" }, { value: "D", text: "D" } ]});

            allQuestionsData2022.push({ id: 'p11q2', source: '9708/13 May/June 2022, Q2', questionText: "The table shows the amount of direct taxes that different households in the UK paid in 2017–2018. Which positive economic statement can be made from the table?", tableHTML: `<table><thead><tr><th></th><th>bottom 20% of households</th><th>second 20% of households</th><th>middle 20% of households</th><th>fourth 20% of households</th><th>top 20% of households</th></tr></thead><tbody><tr><td>average income (£)</td><td>15300</td><td>25000</td><td>34600</td><td>47600</td><td>90600</td></tr><tr><td>direct tax paid (£)</td><td>2000</td><td>3500</td><td>6000</td><td>9500</td><td>21200</td></tr></tbody></table>`, options: [ { value: "A", text: "A Direct tax is unfair on the richer households in the UK." },{ value: "B", text: "B Direct tax in the UK is a proportional tax." },{ value: "C", text: "C Poorer households do not pay enough direct tax in the UK." },{ value: "D", text: "D Rich households pay more direct tax than poor households in the UK." } ]});

            allQuestionsData2022.push({ id: 'p11q8', source: '9708/13 May/June 2022, Q8', questionText: "The demand for tablets increases, while the cost of producing them decreases. What will be the effect on the price of tablets and on the quantity supplied?", tableHTML: `<table><thead><tr><th></th><th>price</th><th>quantity</th></tr></thead><tbody><tr><td>A</td><td>fall</td><td>uncertain</td></tr><tr><td>B</td><td>rise</td><td>increase</td></tr><tr><td>C</td><td>uncertain</td><td>increase</td></tr><tr><td>D</td><td>uncertain</td><td>uncertain</td></tr></tbody></table>`, optionsType: 'choice_from_table', options: [ { value: "A", text: "A" }, { value: "B", text: "B" }, { value: "C", text: "C" }, { value: "D", text: "D" } ]});
            allQuestionsData2022.push({ id: 'p11q9', source: '9708/13 May/June 2022, Q9', questionText: "What is necessary to achieve the best allocation of resources using the price mechanism?", options: [ { value: "A", text: "A Producers can maximise their collective interest." },{ value: "B", text: "B Consumers and producers must have perfect knowledge." },{ value: "C", text: "C The government must be able to apply maximum and minimum prices." },{ value: "D", text: "D The value of the price elasticity of supply must be greater than one." } ]});

            allQuestionsData2022.push({ id: 'p11q22', source: '9708/13 May/June 2022, Q22', questionText: "The data in the table is extracted from the Singapore Balance of Payments for 2019. What was the value ($m) of the trade balance on the current account in 2019?", tableHTML: `<table><thead><tr><th></th><th>$m</th></tr></thead><tbody><tr><td>goods balance</td><td>+134000</td></tr><tr><td>services balance</td><td>+8000</td></tr><tr><td>capital and financial account (net)</td><td>+95000</td></tr><tr><td>balancing item</td><td>–3000</td></tr></tbody></table>`, options: [ { value: "A", text: "A 126000" }, { value: "B", text: "B 142000" }, { value: "C", text: "C 234000" }, { value: "D", text: "D 237000" } ]});

        // Update answers and explanations in the allQuestionsData2022 array
        allQuestionsData2022 = allQuestionsData2022.map(qData => {
            const sourceParts = qData.source.split(', Q');
            let paperKey = "Unknown Paper";
            let questionNum = -1;

            if (sourceParts.length === 2) {
                paperKey = sourceParts[0].trim();
                questionNum = parseInt(sourceParts[1], 10);
            } else {
                 // Fallback for slightly different source string formats if necessary
                const alternativeSourceParts = qData.source.split(' '); //e.g. "9708/12 Feb/Mar 2022 Q1"
                if (alternativeSourceParts.length >= 4) { // Needs at least 4 parts for this structure
                    paperKey = `${alternativeSourceParts[0]} ${alternativeSourceParts[1]} ${alternativeSourceParts[2]}`; // Reconstruct full paper key
                    const qNumPart = alternativeSourceParts[3]; // Assuming Qx is the 4th part
                    if (qNumPart && qNumPart.startsWith('Q')) {
                        questionNum = parseInt(qNumPart.substring(1), 10);
                    }
                }
            }


            let correctAnswer = "Answer Not Found";
            let explanationText = "Explanation not yet available.";

            if (correctAnswersAndExplanations2022[paperKey] && correctAnswersAndExplanations2022[paperKey][questionNum]) {
                correctAnswer = correctAnswersAndExplanations2022[paperKey][questionNum].answer;
                explanationText = correctAnswersAndExplanations2022[paperKey][questionNum].explanation;
            } else {
                 console.warn(`Answer or explanation not found in scheme for: ${qData.source} (Parsed as Paper: ${paperKey}, Q: ${questionNum})`);
            }
            
            return { ...qData, answer: correctAnswer, explanation: explanationText };
        });


        function toggleAnswer(answerId) {
            var answerDiv = document.getElementById(answerId);
            if (answerDiv.style.display === 'none' || answerDiv.style.display === '') {
                answerDiv.style.display = 'block';
            } else {
                answerDiv.style.display = 'none';
            }
        }

        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-content-2022');
            quizContainer.innerHTML = ''; // Clear previous content
            let questionCounter = 0;
            allQuestionsData2022.forEach(qData => {
                if (!qData.questionText || !qData.options) { // Skip if essential data is missing
                    console.warn("Skipping question due to missing text or options:", qData.id, qData.source);
                    return;
                }

                questionCounter++;
                let optionsHTML = '';
                if (qData.optionsType === 'choice_from_table') {
                    optionsHTML = '<ul>';
                    qData.options.forEach(opt => {
                        optionsHTML += `<li><label><input type="radio" name="${qData.id}" value="${opt.value}"> ${opt.text}</label></li>`;
                    });
                    optionsHTML += '</ul>';
                } else { 
                    optionsHTML = '<ul>';
                    (qData.options || []).forEach(opt => {
                        optionsHTML += `<li><label><input type="radio" name="${qData.id}" value="${opt.value}"> ${opt.text}</label></li>`;
                    });
                    optionsHTML += '</ul>';
                }

                const questionBlockHTML = `
                    <div class="question-block">
                        <p class="question-source">Source: ${qData.source}</p>
                        <p class="question-text">${questionCounter}. ${qData.questionText}</p>
                        ${qData.tableHTML ? qData.tableHTML : ''}
                        ${qData.note ? '<p style="font-size:0.9em; color: #555;"><em>' + qData.note + '</em></p>' : ''}
                        <div class="options">
                            ${optionsHTML}
                        </div>
                        <button class="show-answer-btn" onclick="toggleAnswer('ans_exp_${qData.id}')">Show Answer & Explanation</button>
                        <div id="ans_exp_${qData.id}" class="answer-explanation-reveal">
                            <p class="correct-answer">Correct Answer: ${qData.answer}</p>
                            <p class="explanation">${qData.explanation}</p>
                        </div>
                    </div>
                `;
                quizContainer.innerHTML += questionBlockHTML;
            });
        }

        window.onload = renderQuiz;
    </script>
