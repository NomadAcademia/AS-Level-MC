            {

                questionText: "General equilibrium in the macroeconomy is achieved when total injections are equal to total leakages. What is most likely to cause disequilibrium in the macroeconomy in the short run?",
                options: [
                    { value: "A", text: "A an increase in government spending of $10bn and a decrease in exports of $10bn" },
                    { value: "B", text: "B an increase in investment of $30bn and a decrease in household savings of $30bn" },

                ],
                answer: "Not Provided",
                explanation: "Injections (J) = Investment (I) + Government Spending (G) + Exports (X). Leakages (W) = Savings (S) + Taxation (T) + Imports (M). Equilibrium: J=W. In option B: Investment (injection) increases by $30bn. A decrease in household savings means consumption increases (as S is a leakage, less leakage means more remains in flow or becomes consumption which drives demand). This decrease in leakage is effectively like an injection relative to the previous state. So injections rise by at least $30bn (I), and leakages fall (S decreases), leading to J > W and disequilibrium (expansion)."

            {
                id: 'p7q7',

                tableHTML: `<table><thead><tr><th></th><th>nature of good X</th><th>income elasticity of demand for good X</th></tr></thead><tbody><tr><td>A</td><td>inferior good</td><td>–0.8</td></tr><tr><td>B</td><td>inferior good</td><td>–1.2</td></tr><tr><td>C</td><td>normal good</td><td>+0.9</td></tr><tr><td>D</td><td>normal good</td><td>+1.5</td></tr></tbody></table>`,

                explanation: "For the demand curve to shift right when income falls, good X must be an inferior good (negative YED). A larger absolute YED value means a greater responsiveness. YED = %ΔQd / %ΔIncome. %ΔQd = YED * %ΔIncome. For B: %ΔQd = -1.2 * -5% = +6%. This is the largest positive shift in quantity demanded."

            {

            {

                questionText: "In a town, bus fares fall by 50% and this leads to an increase in bus use by 30%. The effect on car use is very low with only a 1% reduction. What is the value of the cross-elasticity of demand between car travel and bus travel?",

                    { value: "C", text: "C There will be no effect." },
                    { value: "D", text: "D There will be excess demand." }
                ],
                answer: "Not Provided",
                explanation: "If there is excess supply at P1, it means P1 is above the equilibrium price. A maximum price (price ceiling) is only effective if set *below* the equilibrium price. If a maximum price is set *above* P1 (and thus even further above the equilibrium price), it will be non-binding and have no effect on the market. The market will still have excess supply at P1 and will tend towards its own equilibrium below P1."

            },
            {
                id: 'p7q18',
                source: '9708/13 October/November 2023, Q18',
                questionText: "An economy in equilibrium has a trade deficit of $20bn and a budget surplus of $20bn. Investment spending is $50bn. What is the total saving?",
                options: [ { value: "A", text: "A $5bn" }, { value: "B", text: "B $10bn" }, { value: "C", text: "C $15bn" }, { value: "D", text: "D $20bn" } ],
                answer: "Not Provided",
                explanation: "In equilibrium, Injections = Leakages. So, I + G + X = S + T + M. Rearranging for S: S = I + (G-T) + (X-M). Trade deficit (X-M) = -$20bn. Budget surplus (T-G) = $20bn, so (G-T) = -$20bn. Investment (I) = $50bn. S = $50bn + (-$20bn) + (-$20bn) = $50bn - $40bn = $10bn."

                    }

                     correctAnswer = "Invalid Question Number";
                     finalExplanation = "Could not parse question number from source. " + finalExplanation;

            } else {
                finalExplanation = "Could not parse source to find correct answer. " + finalExplanation;

            return { ...qData, answer: correctAnswer, explanation: finalExplanation };

            var answerDiv = document.getElementById(answerId);
            if (answerDiv.style.display === 'none' || answerDiv.style.display === '') {
                answerDiv.style.display = 'block';
            } else {
                answerDiv.style.display = 'none';
            }
        }

        function renderQuiz() {
            const quizContainer = document.getElementById('quiz-content');
            if (!quizContainer) {
                console.error("ERROR: Quiz container 'quiz-content' not found.");
                document.body.innerHTML = "Error: Quiz container not found. Please check the HTML structure.";
                return;
            }
            quizContainer.innerHTML = ''; // Clear previous content
            let questionCounter = 0;
            allQuestions.forEach(qData => {
                questionCounter++;
                let optionsHTML = '';
                if (qData.optionsType === 'choice_from_table') {
                    optionsHTML = '<ul>';
                    qData.options.forEach(opt => {
                        optionsHTML += `<li><label><input type="radio" name="${qData.id}" value="${opt.value}"> ${opt.text}</label></li>`;
                    });
                    optionsHTML += '</ul>';
                } else { 
                    optionsHTML = '<ul>';
                    qData.options.forEach(opt => {
                        // Escape HTML special characters in option text
                        const safeOptText = opt.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        optionsHTML += `<li><label><input type="radio" name="${qData.id}" value="${opt.value}"> ${safeOptText}</label></li>`;
                    });
                    optionsHTML += '</ul>';
                }
                
                // Escape HTML special characters in question text and note
                const safeQuestionText = qData.questionText.replace(/</g, "&lt;").replace(/>/g, "&gt;");

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', renderQuiz);

            renderQuiz(); // DOMContentLoaded has already fired
